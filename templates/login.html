{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your account</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Login</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Don't have an account? Sign Up</a>
    </div>
</div>
{% endblock %}
