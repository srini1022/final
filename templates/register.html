{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <h2>Create an Account</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Join the RBAC Portal</p>
    </div>
    
    <form method="POST" action="{{ url_for('register') }}" id="registerForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" class="form-control" required>
                <option value="" disabled selected>Select your role</option>
                <option value="student">Student</option>
                <option value="manager">Manager</option>
                <option value="hod">HOD</option>
            </select>
        </div>

        <!-- Extra details for Students -->
        <div id="studentFields" class="hidden fade-in">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control">
            </div>
            <div class="form-group">
                <label for="usn">USN</label>
                <input type="text" id="usn" name="usn" class="form-control">
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" class="form-control">
            </div>
            <div class="form-group">
                <label for="semester">Semester</label>
                <input type="number" id="semester" name="semester" class="form-control" min="1" max="8">
            </div>
            <div class="form-group">
                <label for="fee_status">Fee Status</label>
                <select id="fee_status" name="fee_status" class="form-control">
                    <option value="" disabled selected>Select Initial Status</option>
                    <option value="Paid">Paid</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Register</button>
    </form>
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Already have an account? Log In</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const roleSelect = document.getElementById('role');
        const studentFields = document.getElementById('studentFields');
        const studentInputs = studentFields.querySelectorAll('input, select');

        roleSelect.addEventListener('change', function() {
            if (this.value === 'student') {
                studentFields.classList.remove('hidden');
                studentInputs.forEach(input => input.setAttribute('required', 'required'));
            } else {
                studentFields.classList.add('hidden');
                studentInputs.forEach(input => {
                    input.removeAttribute('required');
                    input.value = ''; // clear on hide
                });
            }
        });
    });
</script>
{% endblock %}
